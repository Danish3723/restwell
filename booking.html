  <title>RestWell – Book a Service</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">RestWell</div>

    <a href="home.html">Home</a>
    <a href="services.html">Services</a>
    <a class="active" href="history.html">My Bookings </a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<!-- BOOKING SECTION -->
<div class="booking-container">
  <div class="booking-card">

    <h2 class="booking-title">Book a Service</h2>

    <form id="bookingForm" onsubmit="event.preventDefault(); bookService();">

  <!-- SERVICE -->
  <div class="form-group">
    <label>Service</label>
    <select id="service">
      <option value="Office Chair Repair">Office Chair Repair</option>
      <option value="Sofa Repair">Sofa Repair</option>
      <option value="Mattress Repair">Mattress Repair</option>
      <option value="Custom Furniture">Custom Furniture</option>
    </select>
  </div>

  <!-- CUSTOM OPTIONS -->
  <div class="form-group" id="customOptions" style="display:none;">
    <label>Custom Furniture Type</label>
    <select id="customType">
      <option value="">Select option</option>
      <option value="Sofa">Sofa</option>
      <option value="Chair">Chair</option>
      <option value="Curtain">Curtain</option>
      <option value="Mattress">Mattress</option>
    </select>
  </div>

  <!-- NAME -->
  <div class="form-group">
    <label>E-mail</label>
    <input type="text" id="name" placeholder="Your name">
  </div>

  <!-- PHONE -->
  <div class="form-group">
    <label>Phone</label>
    <input type="text" id="phone" placeholder="10-digit phone number">
  </div>

<!-- Description -->
<div class="form-group">
  <label>Problem Description</label>
  <textarea id="description" rows="4" placeholder="Describe your issue in detail..."></textarea>
</div>
      
  <!-- DATE -->
  <div class="form-group">
    <label>Preferred Date</label>
    <input type="date" id="preferredDate">
  </div>

  <!-- TIME SLOT -->
  <div class="form-group">
    <label>Preferred Time Slot</label>
    <select id="timeSlot">
      <option value="">Select time</option>
      <option value="9 AM - 12 PM">9 AM – 12 PM</option>
      <option value="12 PM - 3 PM">12 PM – 3 PM</option>
      <option value="3 PM - 6 PM">3 PM – 6 PM</option>
      <option value="6 PM - 9 PM">6 PM – 9 PM</option>
    </select>
  </div>

  <button type="submit" class="booking-btn">Confirm Booking</button>

  <div id="bookingMessage" class="booking-msg"></div>
</form>
