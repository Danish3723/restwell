<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestWell – My Bookings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">RestWell</div>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="services.html">Services</a>
    <a class="active">My Bookings</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<section class="section">

  <h2 class="section-title">My Bookings</h2>

  <div class="search-bar">
    <input type="text" id="searchPhone" placeholder="Enter your phone number">
    <button onclick="loadMyBookings()">View Bookings</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Service</th>
          <th>Date</th>
          <th>Time Slot</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="myBookingsTable">
      </tbody>
    </table>
  </div>

</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_kWiJPhSRAbtj31k2s373LggRs6wDTQI",
  authDomain: "restwelleveryday.firebaseapp.com",
  projectId: "restwelleveryday",
  storageBucket: "restwelleveryday.firebasestorage.app",
  messagingSenderId: "156467241216",
  appId: "1:156467241216:web:db08000e4e68b19b5f53e5"
};

firebase.initializeApp(firebaseConfig);
</script>

<script src="js/user.js"></script>

<script>
// ==============================
// LOAD USER BOOKINGS
// ==============================
async function loadMyBookings() {

  const phone = document.getElementById("searchPhone").value.trim();

  if (phone.length !== 10) {
    alert("Enter valid 10-digit phone number");
    return;
  }

  const res = await fetch(`https://restwell-backend.onrender.com/api/bookings/phone/${phone}`);
  const bookings = await res.json();

  const table = document.getElementById("myBookingsTable");
  table.innerHTML = "";

  if (bookings.length === 0) {
    table.innerHTML = "<tr><td colspan='4'>No bookings found</td></tr>";
    return;
  }

  bookings.forEach(b => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${b.serviceName}</td>
      <td>${b.preferredDate || "-"}</td>
      <td>${b.timeSlot || "-"}</td>
      <td class="status-${b.status}">${b.status.toUpperCase()}</td>
    `;

    table.appendChild(tr);

  });

}
</script>

</body>
</html>
